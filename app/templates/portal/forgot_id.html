{% extends "base.html" %}

{% block title %}Recover School ID{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 32px auto;">
    <h1>Recover School ID</h1>
    {% if recovered_custom_id %}
        <p style="font-size: 1.2rem; margin-top: 16px;">Your school ID is <strong>{{ recovered_custom_id }}</strong></p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary" style="margin-top: 16px;">Sign In</a>
    {% else %}
        <form method="POST" style="margin-top: 18px;">
            <div class="form-group">
                <label for="school_id">School ID</label>
                <input id="school_id" name="school_id" value="{{ g.current_tenant_id or '' }}" required>
            </div>
            <div class="form-group">
                <label for="contact">Registered Email Or Phone</label>
                <input id="contact" name="contact" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary">Recover ID</button>
        </form>
    {% endif %}
</div>
{% endblock %}
