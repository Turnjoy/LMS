{% extends "base.html" %}

{% block title %}Secure Your Account{% endblock %}

{% block content %}
<div class="card" style="max-width: 560px; margin: 32px auto;">
    <h1>Secure Your Account</h1>
    <p style="margin: 10px 0 20px; color: #666;">ID: <strong>{{ custom_id }}</strong></p>
    <form method="POST" action="{{ url_for('auth.change_password') }}">
        <div class="form-group">
            <label for="password">New Password</label>
            <input id="password" name="password" type="password" minlength="8" required autocomplete="new-password">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="8" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary">Save Password</button>
    </form>
</div>
{% endblock %}
